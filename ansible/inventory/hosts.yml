---
# trashmonitor capture hosts. Provisioned over the tailnet via SSH.
#
# This file is a starting template. Replace the placeholder host
# entries with your own hostnames (MagicDNS names work; bare names
# resolve too if your local resolver knows your tailnet).
#
# Credentials: each host's sudo password comes from -K (interactive)
# or from `ansible_become_password` set per-host (e.g. via env var).

all:
  children:
    trashcam_hosts:
      hosts:
        capture-host-a:
          ansible_host: "{{ lookup('env', 'TRASHCAM_HOST_A') | default('capture-host-a', true) }}"
          ansible_user: "{{ lookup('env', 'TRASHCAM_USER_A') | default('admin', true) }}"
          ansible_python_interpreter: /usr/bin/python3
          ansible_shell_executable: /bin/bash

      vars:
        ansible_connection: ssh
