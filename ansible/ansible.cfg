[defaults]
inventory = inventory/hosts.yml
roles_path = roles
host_key_checking = False
retry_files_enabled = False
stdout_callback = default
result_format = yaml
callbacks_enabled = profile_tasks,timer
interpreter_python = auto_silent
gathering = smart
fact_caching = jsonfile
fact_caching_connection = .ansible_cache
fact_caching_timeout = 3600
force_color = True
nocows = True
error_on_undefined_vars = True
timeout = 30
forks = 4
display_skipped_hosts = False

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=300s -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o IdentitiesOnly=yes
retries = 3

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False
# supply credentials via the ansible_become_password var (Justfile
# recipes use -K interactively), or set ANSIBLE_BECOME_ASK_PASS=True
