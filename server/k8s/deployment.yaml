apiVersion: apps/v1
kind: Deployment
metadata:
  name: trashmonitor
  namespace: trashmonitor
  labels:
    app.kubernetes.io/name: trashmonitor
spec:
  replicas: 1
  strategy:
    type: Recreate           # single source of truth for active stream state
  selector:
    matchLabels:
      app.kubernetes.io/name: trashmonitor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trashmonitor
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: trashmonitor
          image: ghcr.io/<your-org>/tailnet-trashmonitor:latest
          imagePullPolicy: Always
          ports:
            - { name: http,    containerPort: 8080, protocol: TCP }
            - { name: https,   containerPort: 443,  protocol: TCP }
            - { name: rtsp,    containerPort: 8554, protocol: TCP }
            - { name: hls,     containerPort: 8888, protocol: TCP }
            - { name: api,     containerPort: 9997, protocol: TCP }
            - { name: metrics, containerPort: 9998, protocol: TCP }
          readinessProbe:
            httpGet: { path: /v3/paths/list, port: api }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /v3/paths/list, port: api }
            periodSeconds: 30
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              # Caddy binds 443 (privileged) — needs CAP_NET_BIND_SERVICE.
              # Everything else (8080/8554/8888/9997/9998) is unprivileged.
              add: ["NET_BIND_SERVICE"]
          volumeMounts:
            - { name: tmp,    mountPath: /tmp }
            - { name: caddy,  mountPath: /var/lib/caddy }
            - { name: config, mountPath: /config }
            - { name: tls,    mountPath: /etc/caddy/tls, readOnly: true }
      volumes:
        - { name: tmp,    emptyDir: {} }
        - { name: caddy,  emptyDir: {} }
        - { name: config, emptyDir: {} }
        - name: tls
          secret:
            secretName: trashmonitor-ephemera-tls
            optional: true   # pod starts even if cert isn't ready yet
